services:
  - type: web
    name: arogyamitra-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://schrodingerspet.github.io
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
